<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラブプランナー 管理</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3247;
  --text: #e8eaf0; --text-muted: #7a7f9a; --accent: #4a7cdc;
  --U15: #e05252; --U14: #9b59dc; --U13: #4a7cdc; --U12: #3ab07a; --U10: #e0bc3a;
  --red: #e05252; --green: #3ab07a; --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { font-size: 16px; font-weight: 700; }
.header-logo span { color: var(--accent); }
.nav-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: var(--radius); font-size: 13px; cursor: pointer; text-decoration: none; display: inline-block; }
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }

.tab-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; overflow-x: auto; }
.tab-btn { padding: 12px 14px; font-size: 13px; font-weight: 700; color: var(--text-muted); background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

/* Form styles */
.section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media(max-width:480px){ .form-grid { grid-template-columns: 1fr; } }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1/-1; }
label { font-size: 11px; color: var(--text-muted); font-weight: 700; }
input, select, textarea {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 10px; border-radius: var(--radius); font-size: 13px; width: 100%;
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
textarea { resize: vertical; min-height: 60px; }
.btn { padding: 10px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #3a6cc0; }
.btn-danger { background: rgba(224,82,82,0.15); color: var(--red); border: 1px solid rgba(224,82,82,0.3); }
.btn-danger:hover { background: rgba(224,82,82,0.25); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-add { background: var(--surface2); border: 1px dashed var(--border); color: var(--text-muted); width: 100%; padding: 10px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
.btn-add:hover { border-color: var(--accent); color: var(--accent); }

/* List items */
.item-list { display: flex; flex-direction: column; gap: 6px; }
.item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; align-items: center; justify-content: space-between; }
.item-info { flex: 1; }
.item-name { font-size: 14px; font-weight: 700; }
.item-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.item-actions { display: flex; gap: 6px; }

/* Category badge */
.cat-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }

/* Multi-select chips */
.chip-select { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); min-height: 42px; }
.chip { padding: 3px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted); }
.chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 500; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); }

/* Conflict warning */
.warning { background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.3); border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: var(--red); margin-bottom: 10px; display: none; }
.warning.show { display: block; }

/* Save bar */
.save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
.save-status { font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚙️ 管理<span>画面</span></div>
  <a class="nav-btn" href="planner.html">← 閲覧画面</a>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('activities')">📅 活動登録</button>
  <button class="tab-btn" onclick="switchTab('players')">👤 選手</button>
  <button class="tab-btn" onclick="switchTab('staff')">🧑‍💼 スタッフ</button>
  <button class="tab-btn" onclick="switchTab('absences')">🏖 休み</button>
  <button class="tab-btn" onclick="switchTab('settings')">⚙️ 設定</button>
</div>

<!-- === Activities Tab === -->
<div class="tab-content active" id="tab-activities">
  <div class="section-title">
    活動登録
    <button class="btn btn-primary btn-sm" onclick="openActForm()">＋ 新規登録</button>
  </div>

  <!-- Form -->
  <div class="form-card" id="act-form" style="display:none">
    <div style="font-size:14px;font-weight:700;margin-bottom:12px" id="act-form-title">活動を登録</div>
    <div class="warning" id="conflict-warn"></div>
    <div class="form-grid">
      <div class="form-group">
        <label>日付 *</label>
        <input type="date" id="f-date" onchange="checkConflicts()">
      </div>
      <div class="form-group">
        <label>カテゴリー *</label>
        <select id="f-cat" onchange="updatePlayerChips()">
          <option value="">選択</option>
          <option value="U15">U15</option>
          <option value="U14">U14</option>
          <option value="U13">U13</option>
          <option value="U12">U12</option>
          <option value="U10">U10</option>
        </select>
      </div>
      <div class="form-group">
        <label>活動種別 *</label>
        <select id="f-type">
          <option value="TR">TR（トレーニング）</option>
          <option value="TRM">TRM（練習試合）</option>
          <option value="GAME">公式戦</option>
          <option value="TOUR">遠征</option>
          <option value="OFF">OFF</option>
        </select>
      </div>
      <div class="form-group">
        <label>活動名</label>
        <input type="text" id="f-name" placeholder="例: U15 TR">
      </div>
      <div class="form-group">
        <label>開始時間</label>
        <input type="time" id="f-start" value="16:00" onchange="checkConflicts()">
      </div>
      <div class="form-group">
        <label>終了時間</label>
        <input type="time" id="f-end" value="18:00" onchange="checkConflicts()">
      </div>
      <div class="form-group full">
        <label>会場</label>
        <select id="f-venue" onchange="checkConflicts()">
          <option value="">選択</option>
        </select>
      </div>
    </div>

    <div class="form-group" style="margin-top:10px">
      <label>担当スタッフ</label>
      <div class="chip-select" id="staff-chips"></div>
    </div>
    <div class="form-group" style="margin-top:10px">
      <label>使用車両</label>
      <div class="chip-select" id="vehicle-chips"></div>
    </div>
    <div class="form-group" style="margin-top:10px">
      <label>追加招集選手（他カテゴリーから）</label>
      <div class="chip-select" id="extra-player-chips"></div>
    </div>
    <div class="form-group" style="margin-top:10px">
      <label>欠席選手</label>
      <div class="chip-select" id="absent-chips"></div>
    </div>
    <div class="form-group" style="margin-top:10px">
      <label>参加予定人数（自動計算）</label>
      <input type="text" id="f-count" readonly style="color:var(--accent);font-weight:700">
    </div>
    <div class="form-group" style="margin-top:10px">
      <label>備考</label>
      <textarea id="f-notes" placeholder="対戦相手・連絡事項など"></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary" onclick="saveActivity()">保存</button>
      <button class="btn" style="background:var(--surface2);border:1px solid var(--border)" onclick="closeActForm()">キャンセル</button>
      <button class="btn btn-danger btn-sm" id="del-act-btn" style="display:none;margin-left:auto" onclick="deleteActivity()">削除</button>
    </div>
  </div>

  <!-- Activity List -->
  <div class="item-list" id="act-list"></div>
</div>

<!-- === Players Tab === -->
<div class="tab-content" id="tab-players">
  <div class="section-title">
    選手管理
    <button class="btn btn-primary btn-sm" onclick="openPlayerForm()">＋ 追加</button>
  </div>
  <div class="form-card" id="player-form" style="display:none">
    <div class="form-grid">
      <div class="form-group">
        <label>選手名 *</label>
        <input type="text" id="pf-name" placeholder="氏名">
      </div>
      <div class="form-group">
        <label>カテゴリー *</label>
        <select id="pf-cat">
          <option value="U15">U15</option><option value="U14">U14</option>
          <option value="U13">U13</option><option value="U12">U12</option><option value="U10">U10</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-primary btn-sm" onclick="savePlayer()">保存</button>
      <button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border)" onclick="document.getElementById('player-form').style.display='none'">キャンセル</button>
      <button class="btn btn-danger btn-sm" id="del-player-btn" style="display:none;margin-left:auto" onclick="deletePlayer()">削除</button>
    </div>
  </div>
  <div class="item-list" id="player-list"></div>
</div>

<!-- === Staff Tab === -->
<div class="tab-content" id="tab-staff">
  <div class="section-title">
    スタッフ管理
    <button class="btn btn-primary btn-sm" onclick="openStaffForm()">＋ 追加</button>
  </div>
  <div class="form-card" id="staff-form" style="display:none">
    <div class="form-grid">
      <div class="form-group">
        <label>氏名 *</label>
        <input type="text" id="sf-name" placeholder="氏名">
      </div>
      <div class="form-group">
        <label>役職</label>
        <select id="sf-role">
          <option value="監督">監督</option><option value="ヘッドコーチ">ヘッドコーチ</option>
          <option value="コーチ">コーチ</option><option value="GKコーチ">GKコーチ</option>
          <option value="マネージャー">マネージャー</option><option value="トレーナー">トレーナー</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-primary btn-sm" onclick="saveStaff()">保存</button>
      <button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border)" onclick="document.getElementById('staff-form').style.display='none'">キャンセル</button>
      <button class="btn btn-danger btn-sm" id="del-staff-btn" style="display:none;margin-left:auto" onclick="deleteStaff()">削除</button>
    </div>
  </div>
  <div class="item-list" id="staff-list"></div>
</div>

<!-- === Absences Tab === -->
<div class="tab-content" id="tab-absences">
  <div class="section-title">
    選手休み管理
    <button class="btn btn-primary btn-sm" onclick="openAbsForm()">＋ 追加</button>
  </div>
  <div class="form-card" id="abs-form" style="display:none">
    <div class="form-grid">
      <div class="form-group full">
        <label>選手名 *</label>
        <select id="abf-player"></select>
      </div>
      <div class="form-group">
        <label>開始日</label>
        <input type="date" id="abf-start">
      </div>
      <div class="form-group">
        <label>終了日</label>
        <input type="date" id="abf-end">
      </div>
      <div class="form-group full">
        <label>理由</label>
        <select id="abf-reason">
          <option value="家族旅行">家族旅行</option><option value="帰省">帰省</option>
          <option value="怪我">怪我</option><option value="病気">病気</option>
          <option value="学校行事">学校行事</option><option value="その他">その他</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-primary btn-sm" onclick="saveAbsence()">保存</button>
      <button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border)" onclick="document.getElementById('abs-form').style.display='none'">キャンセル</button>
      <button class="btn btn-danger btn-sm" id="del-abs-btn" style="display:none;margin-left:auto" onclick="deleteAbsence()">削除</button>
    </div>
  </div>
  <div class="item-list" id="abs-list"></div>
</div>

<!-- === Settings Tab === -->
<div class="tab-content" id="tab-settings">
  <div class="section-title">JSONBin 設定</div>
  <div class="form-card">
    <div class="form-group" style="margin-bottom:10px">
      <label>Bin ID</label>
      <input type="text" id="s-binid" placeholder="例: 6a28d6...">
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label>Access Key</label>
      <input type="text" id="s-apikey" placeholder="$2a$10$...">
    </div>
    <button class="btn btn-primary btn-sm" onclick="saveSettings()">設定を保存</button>
    <p style="font-size:11px;color:var(--text-muted);margin-top:10px">設定はlocalStorageに保存されます。JSONBinの管理画面でBin IDとアクセスキーを取得してください。</p>
  </div>

  <div class="section-title" style="margin-top:16px">会場マスター</div>
  <div class="form-card">
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input type="text" id="venue-input" placeholder="会場名">
      <button class="btn btn-primary btn-sm" onclick="addVenue()">追加</button>
    </div>
    <div class="item-list" id="venue-list"></div>
  </div>

  <div class="section-title" style="margin-top:16px">車両マスター</div>
  <div class="form-card">
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input type="text" id="veh-input" placeholder="車両名">
      <button class="btn btn-primary btn-sm" onclick="addVehicle()">追加</button>
    </div>
    <div class="item-list" id="veh-list"></div>
  </div>

  <div style="margin-top:16px">
    <button class="btn btn-danger" onclick="exportData()">データをエクスポート（JSON）</button>
  </div>
</div>

<div class="save-bar">
  <span class="save-status" id="save-status">未保存の変更があります</span>
  <button class="btn btn-primary" onclick="saveAll()">💾 保存する</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Config =====
const CONFIG_KEY = 'planner_config';
const DATA_KEY = 'planner_data';

let cfg = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{"binId":"","apiKey":""}');
let data = { activities:[], players:[], staff:[], vehicles:['マイクロバス','ハイエース①','ハイエース②','軽トラック'], venues:['白州総合グラウンド','長坂総合スポーツ公園'], absences:[] };

const CAT_COLOR = { U15:'#e05252', U14:'#9b59dc', U13:'#4a7cdc', U12:'#3ab07a', U10:'#e0bc3a' };

// ===== JSONBin =====
async function binGet() {
  if (!cfg.binId || !cfg.apiKey) return null;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, {
      headers: { 'X-Access-Key': cfg.apiKey }
    });
    if (!r.ok) return null;
    const j = await r.json();
    return j.record;
  } catch(e) { return null; }
}

async function binPut(d) {
  if (!cfg.binId || !cfg.apiKey) {
    localStorage.setItem(DATA_KEY, JSON.stringify(d));
    return true;
  }
  try {
    // Safe GET-then-PUT
    const current = await binGet();
    const merged = { ...current, ...d };
    const r = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`, {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', 'X-Access-Key': cfg.apiKey },
      body: JSON.stringify(merged)
    });
    localStorage.setItem(DATA_KEY, JSON.stringify(merged));
    return r.ok;
  } catch(e) {
    localStorage.setItem(DATA_KEY, JSON.stringify(d));
    return false;
  }
}

// ===== Init =====
async function init() {
  // Load from JSONBin or localStorage
  const remote = await binGet();
  const local = localStorage.getItem(DATA_KEY);
  if (remote) data = { ...data, ...remote };
  else if (local) data = { ...data, ...JSON.parse(local) };

  // Load settings
  document.getElementById('s-binid').value = cfg.binId;
  document.getElementById('s-apikey').value = cfg.apiKey;

  renderAll();
  updateSaveStatus();
}

function renderAll() {
  renderActList();
  renderPlayerList();
  renderStaffList();
  renderAbsList();
  renderVenueList();
  renderVehList();
}

// ===== Tab =====
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  closeActForm();
}

// ===== Toast =====
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err?' error':'');
  setTimeout(()=>el.className='toast', 2500);
}

function updateSaveStatus() {
  document.getElementById('save-status').textContent = cfg.binId ? 'JSONBin接続済み' : 'ローカル保存モード';
}

// ===== Save All =====
async function saveAll() {
  const ok = await binPut(data);
  toast(ok ? '保存しました ✓' : 'ローカルに保存しました（JSONBin未設定）');
  renderAll();
}

// ===== Settings =====
function saveSettings() {
  cfg.binId = document.getElementById('s-binid').value.trim();
  cfg.apiKey = document.getElementById('s-apikey').value.trim();
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
  toast('設定を保存しました');
  updateSaveStatus();
}

// ===== Activities =====
let editActId = null;

function openActForm(id=null) {
  editActId = id;
  const form = document.getElementById('act-form');
  form.style.display = 'block';
  form.scrollIntoView({ behavior:'smooth' });
  document.getElementById('act-form-title').textContent = id ? '活動を編集' : '活動を登録';
  document.getElementById('del-act-btn').style.display = id ? 'inline-block' : 'none';
  document.getElementById('conflict-warn').classList.remove('show');

  if (id) {
    const a = data.activities.find(x=>x.id===id);
    if (!a) return;
    document.getElementById('f-date').value = a.date;
    document.getElementById('f-cat').value = a.category;
    document.getElementById('f-type').value = a.actType;
    document.getElementById('f-name').value = a.name||'';
    document.getElementById('f-start').value = a.startTime;
    document.getElementById('f-end').value = a.endTime;
    document.getElementById('f-notes').value = a.notes||'';
    document.getElementById('f-count').value = a.playerCount||'';
    setTimeout(()=>{
      setupVenueSelect(a.venue);
      setupChips('staff-chips', data.staff.map(s=>s.name), a.staff||[]);
      setupChips('vehicle-chips', data.vehicles, a.vehicles||[]);
      updatePlayerChips(a.extraPlayers||[], a.absentPlayers||[]);
    },50);
  } else {
    document.getElementById('f-date').value = '';
    document.getElementById('f-cat').value = '';
    document.getElementById('f-type').value = 'TR';
    document.getElementById('f-name').value = '';
    document.getElementById('f-start').value = '16:00';
    document.getElementById('f-end').value = '18:00';
    document.getElementById('f-notes').value = '';
    document.getElementById('f-count').value = '';
    setupVenueSelect('');
    setupChips('staff-chips', data.staff.map(s=>s.name), []);
    setupChips('vehicle-chips', data.vehicles, []);
    updatePlayerChips();
  }
}

function closeActForm() {
  document.getElementById('act-form').style.display = 'none';
  editActId = null;
}

function setupVenueSelect(selected='') {
  const sel = document.getElementById('f-venue');
  sel.innerHTML = '<option value="">選択してください</option>' +
    data.venues.map(v=>`<option value="${v}"${v===selected?' selected':''}>${v}</option>`).join('') +
    '<option value="その他">その他</option>';
}

function setupChips(containerId, options, selected) {
  const el = document.getElementById(containerId);
  el.innerHTML = options.map(o=>`
    <span class="chip${selected.includes(o)?' selected':''}" onclick="toggleChip(this)">${o}</span>
  `).join('');
  updatePlayerCount();
}

function toggleChip(chip) {
  chip.classList.toggle('selected');
  updatePlayerCount();
}

function getSelectedChips(containerId) {
  return [...document.querySelectorAll(`#${containerId} .chip.selected`)].map(c=>c.textContent.trim());
}

function updatePlayerChips(extraSelected=[], absentSelected=[]) {
  const cat = document.getElementById('f-cat').value;
  // Extra players from other categories
  const others = data.players.filter(p=>p.category !== cat);
  const el = document.getElementById('extra-player-chips');
  el.innerHTML = others.map(p=>`
    <span class="chip${extraSelected.includes(p.name)?' selected':''}" data-player="${p.name}" onclick="toggleChip(this);updatePlayerCount()">${p.category} ${p.name}</span>
  `).join('');
  // Absent players from this category
  const mine = data.players.filter(p=>p.category===cat);
  const absEl = document.getElementById('absent-chips');
  absEl.innerHTML = mine.map(p=>`
    <span class="chip${absentSelected.includes(p.name)?' selected':''}" data-player="${p.name}" onclick="toggleChip(this);updatePlayerCount()">${p.name}</span>
  `).join('') + getSelectedChips('extra-player-chips').map(name=>`
    <span class="chip${absentSelected.includes(name)?' selected':''}" data-player="${name}" onclick="toggleChip(this);updatePlayerCount()">${name}</span>
  `).join('');
  updatePlayerCount();
}

function updatePlayerCount() {
  const cat = document.getElementById('f-cat').value;
  if (!cat) { document.getElementById('f-count').value = ''; return; }
  const base = data.players.filter(p=>p.category===cat).length;
  const extra = getSelectedChips('extra-player-chips').length;
  const absent = getSelectedChips('absent-chips').length;

  // Also auto-exclude players on registered absences for the selected date
  const date = document.getElementById('f-date').value;
  let autoAbsent = 0;
  if (date) {
    data.players.filter(p=>p.category===cat).forEach(p=>{
      const isAbsent = (data.absences||[]).some(ab=>ab.playerName===p.name && date>=ab.startDate && date<=ab.endDate);
      if (isAbsent) autoAbsent++;
    });
  }
  const total = Math.max(0, base + extra - absent - autoAbsent);
  document.getElementById('f-count').value = `${total}名（基本${base}名 + 追加${extra}名 - 欠席${absent+autoAbsent}名）`;
}

function checkConflicts() {
  const date = document.getElementById('f-date').value;
  const venue = document.getElementById('f-venue').value;
  const start = document.getElementById('f-start').value;
  const end = document.getElementById('f-end').value;
  if (!date || !venue || !start || !end) return;

  const conflicts = data.activities.filter(a => {
    if (a.id === editActId) return false;
    if (a.date !== date || a.venue !== venue || a.actType === 'OFF') return false;
    return a.startTime < end && a.endTime > start;
  });

  const warn = document.getElementById('conflict-warn');
  if (conflicts.length) {
    warn.textContent = `⚠ 会場重複: ${venue} は ${conflicts.map(c=>c.category+' '+c.startTime+'〜'+c.endTime).join('、')} と時間が重複しています`;
    warn.classList.add('show');
  } else {
    warn.classList.remove('show');
  }
  updatePlayerCount();
}

function saveActivity() {
  const date = document.getElementById('f-date').value;
  const cat = document.getElementById('f-cat').value;
  if (!date || !cat) { toast('日付とカテゴリーは必須です', true); return; }
  const actType = document.getElementById('f-type').value;
  const nameVal = document.getElementById('f-name').value || `${cat} ${actType}`;

  const a = {
    id: editActId || 'a' + Date.now(),
    date, category: cat, actType, name: nameVal,
    startTime: document.getElementById('f-start').value,
    endTime: document.getElementById('f-end').value,
    venue: document.getElementById('f-venue').value,
    staff: getSelectedChips('staff-chips'),
    vehicles: getSelectedChips('vehicle-chips'),
    extraPlayers: getSelectedChips('extra-player-chips'),
    absentPlayers: getSelectedChips('absent-chips'),
    notes: document.getElementById('f-notes').value,
    playerCount: parseInt(document.getElementById('f-count').value) || 0
  };

  if (editActId) {
    const idx = data.activities.findIndex(x=>x.id===editActId);
    data.activities[idx] = a;
  } else {
    data.activities.push(a);
  }

  data.activities.sort((a,b)=>a.date.localeCompare(b.date)||a.startTime.localeCompare(b.startTime));
  closeActForm();
  renderActList();
  toast('活動を保存しました ✓');
}

function deleteActivity() {
  if (!confirm('この活動を削除しますか？')) return;
  data.activities = data.activities.filter(a=>a.id!==editActId);
  closeActForm();
  renderActList();
  toast('削除しました');
}

function renderActList() {
  const el = document.getElementById('act-list');
  if (!data.activities.length) {
    el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted)">活動データなし。「＋ 新規登録」から追加してください。</div>';
    return;
  }
  el.innerHTML = data.activities.map(a=>{
    const color = CAT_COLOR[a.category]||'#888';
    return `<div class="item-card">
      <div class="item-info" onclick="openActForm('${a.id}')" style="cursor:pointer">
        <div class="item-name" style="display:flex;align-items:center;gap:8px">
          <span class="cat-badge" style="background:${color}22;color:${color}">${a.category}</span>
          ${a.name||a.actType}
        </div>
        <div class="item-sub">${a.date} ${a.startTime}〜${a.endTime} ${a.venue?'📍'+a.venue:''}</div>
      </div>
      <div class="item-actions">
        <button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border)" onclick="openActForm('${a.id}')">編集</button>
      </div>
    </div>`;
  }).join('');
}

// ===== Players =====
let editPlayerId = null;

function openPlayerForm(id=null) {
  editPlayerId = id;
  const form = document.getElementById('player-form');
  form.style.display = 'block';
  document.getElementById('del-player-btn').style.display = id ? 'inline-block' : 'none';
  if (id) {
    const p = data.players.find(x=>x.id===id);
    document.getElementById('pf-name').value = p.name;
    document.getElementById('pf-cat').value = p.category;
  } else {
    document.getElementById('pf-name').value = '';
    document.getElementById('pf-cat').value = 'U15';
  }
}

function savePlayer() {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) { toast('名前を入力してください', true); return; }
  const p = { id: editPlayerId||'p'+Date.now(), name, category: document.getElementById('pf-cat').value };
  if (editPlayerId) {
    const idx = data.players.findIndex(x=>x.id===editPlayerId);
    data.players[idx] = p;
  } else data.players.push(p);
  document.getElementById('player-form').style.display = 'none';
  editPlayerId = null;
  renderPlayerList();
  toast('選手を保存しました ✓');
}

function deletePlayer() {
  if (!confirm('削除しますか？')) return;
  data.players = data.players.filter(p=>p.id!==editPlayerId);
  document.getElementById('player-form').style.display = 'none';
  editPlayerId = null;
  renderPlayerList();
  toast('削除しました');
}

function renderPlayerList() {
  const el = document.getElementById('player-list');
  const groups = {};
  data.players.forEach(p=>{ if(!groups[p.category])groups[p.category]=[]; groups[p.category].push(p); });
  el.innerHTML = ['U15','U14','U13','U12','U10'].map(cat=>{
    if (!groups[cat]) return '';
    const color = CAT_COLOR[cat]||'#888';
    return `<div style="margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:${color};margin-bottom:4px">${cat} (${groups[cat].length}名)</div>
      ${groups[cat].map(p=>`
        <div class="item-card" style="padding:8px 12px;cursor:pointer" onclick="openPlayerForm('${p.id}')">
          <div class="item-name">${p.name}</div>
          <button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border)">編集</button>
        </div>
      `).join('')}
    </div>`;
  }).join('') || '<div style="padding:24px;text-align:center;color:var(--text-muted)">選手データなし</div>';
}

function deleteStaff() {

// ===== Absences =====
let editAbsId = null;

function openAbsForm(id=null) {
  editAbsId = id;
  const form = document.getElementById('abs-form');
  form.style.display = 'block';
  // Populate player select
  const sel = document.getElementById('abf-player');
  sel.innerHTML = data.players.map(p=>`<option value="${p.name}">${p.category} ${p.name}</option>`).join('');
  document.getElementById('del-abs-btn').style.display = id ? 'inline-block' : 'none';
  if (id) {
    const ab = data.absences.find(x=>x.id===id);
    sel.value = ab.playerName;
    document.getElementById('abf-start').value = ab.startDate;
    document.getElementById('abf-end').value = ab.endDate;
    document.getElementById('abf-reason').value = ab.reason;
  } else {
    document.getElementById('abf-start').value = '';
    document.getElementById('abf-end').value = '';
    document.getElementById('abf-reason').value = '家族旅行';
  }
}

function saveAbsence() {
  const playerName = document.getElementById('abf-player').value;
  const startDate = document.getElementById('abf-start').value;
  const endDate = document.getElementById('abf-end').value;
  if (!playerName || !startDate || !endDate) { toast('必須項目を入力してください', true); return; }
  const ab = { id: editAbsId||'ab'+Date.now(), playerName, startDate, endDate, reason: document.getElementById('abf-reason').value };
  if (editAbsId) {
    const idx = data.absences.findIndex(x=>x.id===editAbsId);
    data.absences[idx] = ab;
  } else data.absences.push(ab);
  document.getElementById('abs-form').style.display = 'none';
  editAbsId = null;
  renderAbsList();
  toast('休み情報を保存しました ✓');
}

function deleteAbsence() {
  if (!confirm('削除しますか？')) return;
  data.absences = data.absences.filter(a=>a.id!==editAbsId);
  document.getElementById('abs-form').style.display = 'none';
  editAbsId = null;
  renderAbsList();
  toast('削除しました');
}

function renderAbsList() {
  const el = document.getElementById('abs-list');
  if (!data.absences.length) {
    el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted)">休みデータなし</div>';
    return;
  }
  el.innerHTML = [...data.absences].sort((a,b)=>a.startDate.localeCompare(b.startDate)).map(ab=>`
    <div class="item-card" style="cursor:pointer" onclick="openAbsForm('${ab.id}')">
      <div class="item-info">
        <div class="item-name">${ab.playerName}</div>
        <div class="item-sub">${ab.startDate} 〜 ${ab.endDate} ／ ${ab.reason}</div>
      </div>
      <button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border)">編集</button>
    </div>
  `).join('');
}

// ===== Venues =====
function addVenue() {
  const val = document.getElementById('venue-input').value.trim();
  if (!val || data.venues.includes(val)) { toast('すでに存在するか空白です', true); return; }
  data.venues.push(val);
  document.getElementById('venue-input').value = '';
  renderVenueList();
  toast('会場を追加しました');
}

function removeVenue(v) {
  data.venues = data.venues.filter(x=>x!==v);
  renderVenueList();
}

function renderVenueList() {
  document.getElementById('venue-list').innerHTML = data.venues.map(v=>`
    <div class="item-card" style="padding:8px 12px">
      <div class="item-name">📍 ${v}</div>
      <button class="btn btn-danger btn-sm" onclick="removeVenue('${v}')">削除</button>
    </div>
  `).join('');
}

// ===== Vehicles =====
function addVehicle() {
  const val = document.getElementById('veh-input').value.trim();
  if (!val || data.vehicles.includes(val)) { toast('すでに存在するか空白です', true); return; }
  data.vehicles.push(val);
  document.getElementById('veh-input').value = '';
  renderVehList();
}

function removeVehicle(v) {
  data.vehicles = data.vehicles.filter(x=>x!==v);
  renderVehList();
}

function renderVehList() {
  document.getElementById('veh-list').innerHTML = data.vehicles.map(v=>`
    <div class="item-card" style="padding:8px 12px">
      <div class="item-name">🚐 ${v}</div>
      <button class="btn btn-danger btn-sm" onclick="removeVehicle('${v}')">削除</button>
    </div>
  `).join('');
}

// ===== Export =====
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `planner_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

init();
