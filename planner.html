<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラブ活動プランナー</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3247;
  --text: #e8eaf0;
  --text-muted: #7a7f9a;
  --accent: #4a7cdc;
  --U15: #e05252;
  --U14: #9b59dc;
  --U13: #4a7cdc;
  --U12: #3ab07a;
  --U11: #2ba8a8;
  --U10: #e0bc3a;
  --U9: #e08c3a;
  --U8: #c97ad6;
  --red: #e05252;
  --yellow: #e0bc3a;
  --green: #3ab07a;
  --radius: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; min-height: 100vh; }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
.header-logo span { color: var(--accent); }
.header-nav { display: flex; gap: 8px; }
.nav-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: var(--radius); font-size: 13px; cursor: pointer; text-decoration: none; display: inline-block; }
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Dashboard */
.dashboard { padding: 16px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
@media(max-width:600px){ .dashboard { grid-template-columns: repeat(3, 1fr); } }
.dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
.dash-num { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
.dash-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* Calendar */
.calendar-wrap { padding: 0 16px 16px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-title { font-size: 18px; font-weight: 700; }
.cal-nav { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: var(--radius); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.cal-nav:hover { border-color: var(--accent); }

.cal-filter { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-btn { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; border: 2px solid transparent; background: var(--surface2); color: var(--text-muted); transition: all 0.15s; }
.filter-btn[data-cat="U15"] { border-color: var(--U15); }
.filter-btn[data-cat="U14"] { border-color: var(--U14); }
.filter-btn[data-cat="U13"] { border-color: var(--U13); }
.filter-btn[data-cat="U12"] { border-color: var(--U12); }
.filter-btn[data-cat="U11"] { border-color: var(--U11); }
.filter-btn[data-cat="U10"] { border-color: var(--U10); }
.filter-btn[data-cat="U9"] { border-color: var(--U9); }
.filter-btn[data-cat="U8"] { border-color: var(--U8); }
.filter-btn.active[data-cat="U15"] { background: var(--U15); color: #fff; }
.filter-btn.active[data-cat="U14"] { background: var(--U14); color: #fff; }
.filter-btn.active[data-cat="U13"] { background: var(--U13); color: #fff; }
.filter-btn.active[data-cat="U12"] { background: var(--U12); color: #fff; }
.filter-btn.active[data-cat="U11"] { background: var(--U11); color: #fff; }
.filter-btn.active[data-cat="U10"] { background: var(--U10); color: #111; }
.filter-btn.active[data-cat="U9"] { background: var(--U9); color: #fff; }
.filter-btn.active[data-cat="U8"] { background: var(--U8); color: #fff; }

.cal-grid { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
.cal-wd { text-align: center; padding: 8px 0; font-size: 11px; font-weight: 700; color: var(--text-muted); }
.cal-wd:first-child { color: var(--red); }
.cal-wd:last-child { color: #6ab4ff; }

.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); height: 86px; padding: 3px; position: relative; overflow: hidden; }
.cal-day:nth-child(7n) { border-right: none; }
@media(max-width:600px){ .cal-day { height: 68px; padding: 2px; } }
.cal-day.other-month .day-num { color: var(--border); }
.cal-day.today { background: rgba(74,124,220,0.08); }
.cal-day.today .day-num { color: var(--accent); font-weight: 700; }
.day-num { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; line-height: 1; display: flex; align-items: center; gap: 2px; }
.cal-day:nth-child(7n+1) .day-num { color: var(--red); }
.cal-day:nth-child(7n) .day-num { color: #6ab4ff; }

.event-chip { font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; line-height: 1.5; }
@media(max-width:600px){ .event-chip { font-size: 8px; padding: 1px 3px; } }
.event-chip[data-cat="U15"] { background: rgba(224,82,82,0.2); color: var(--U15); border-left: 3px solid var(--U15); }
.event-chip[data-cat="U14"] { background: rgba(155,89,220,0.2); color: var(--U14); border-left: 3px solid var(--U14); }
.event-chip[data-cat="U13"] { background: rgba(74,124,220,0.2); color: var(--U13); border-left: 3px solid var(--U13); }
.event-chip[data-cat="U12"] { background: rgba(58,176,122,0.2); color: var(--U12); border-left: 3px solid var(--U12); }
.event-chip[data-cat="U11"] { background: rgba(43,168,168,0.2); color: var(--U11); border-left: 3px solid var(--U11); }
.event-chip[data-cat="U10"] { background: rgba(224,188,58,0.2); color: var(--U10); border-left: 3px solid var(--U10); }
.event-chip[data-cat="U9"] { background: rgba(224,140,58,0.2); color: var(--U9); border-left: 3px solid var(--U9); }
.event-chip[data-cat="U8"] { background: rgba(201,122,214,0.2); color: var(--U8); border-left: 3px solid var(--U8); }
.more-chip { font-size: 10px; color: var(--text-muted); padding: 1px 4px; cursor: pointer; }
.more-chip:hover { color: var(--accent); }
.abs-badge-view { display: inline-flex; align-items: center; font-size: 8px; font-weight: 700; padding: 0 4px; border-radius: 6px; background: rgba(224,188,58,0.18); color: var(--yellow); margin-left: 4px; vertical-align: middle; }
.event-chip.personal-event-view { background: rgba(122,127,154,0.18); color: var(--text-muted); border-left: 3px solid var(--text-muted); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border-radius: 16px 16px 0 0; width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto; padding: 20px; transform: translateY(100%); transition: transform 0.25s ease; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

.event-detail { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.ev-cat { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
.ev-name { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
.ev-rows { display: flex; flex-direction: column; gap: 8px; }
.ev-row { display: flex; gap: 10px; font-size: 13px; }
.ev-row-label { color: var(--text-muted); width: 80px; flex-shrink: 0; }
.ev-row-val { color: var(--text); }

/* Load view */
.load-section { padding: 0 16px 24px; }
.load-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }
.load-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; width: 100%; border-collapse: collapse; }
.load-table th { background: var(--surface2); padding: 8px 12px; font-size: 11px; text-align: left; color: var(--text-muted); border-bottom: 1px solid var(--border); }
.load-table td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid var(--border); }
.load-table tr:last-child td { border-bottom: none; }
.load-bar-wrap { background: var(--bg); border-radius: 4px; height: 6px; width: 100px; overflow: hidden; }
.load-bar { height: 100%; border-radius: 4px; }
.load-green { background: var(--green); }
.load-yellow { background: var(--yellow); }
.load-red { background: var(--red); }
.badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.badge-green { background: rgba(58,176,122,0.2); color: var(--green); }
.badge-yellow { background: rgba(224,188,58,0.2); color: var(--yellow); }
.badge-red { background: rgba(224,82,82,0.2); color: var(--red); }

/* Tab nav */
.tab-nav { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; overflow-x: auto; }
.tab-btn { padding: 12px 16px; font-size: 13px; font-weight: 700; color: var(--text-muted); background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Day-row List view (NEW) */
.daylist-wrap { padding: 12px 16px 24px; }
.daylist-nav { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.daylist-nav-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: var(--radius); font-size: 12px; cursor: pointer; }
.daylist-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.daylist-today-label { font-size: 13px; font-weight: 700; color: var(--text-muted); }
.daylist-legend { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.daylist-legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); }
.daylist-legend-dot { width: 8px; height: 8px; border-radius: 2px; }

.day-row-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; display: flex; overflow: hidden; }
.day-row-card.is-today { border-color: var(--accent); }
.day-row-date { width: 64px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px; background: var(--surface2); border-right: 1px solid var(--border); gap: 2px; }
.day-row-date .drd-day { font-size: 22px; font-weight: 700; line-height: 1; }
.day-row-date .drd-wd { font-size: 10px; color: var(--text-muted); }
.day-row-date .drd-today-tag { font-size: 8px; background: var(--accent); color: #fff; padding: 1px 5px; border-radius: 8px; margin-top: 2px; }
.day-row-card.is-today .day-row-date { background: rgba(74,124,220,0.15); }
.day-row-date.is-sun .drd-day { color: var(--red); }
.day-row-date.is-sat .drd-day { color: #6ab4ff; }

.day-row-cats { flex: 1; display: flex; gap: 6px; overflow-x: auto; padding: 8px; scrollbar-width: thin; }
.day-row-cats::-webkit-scrollbar { height: 4px; }
.day-row-cats::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.cat-minicard { flex: 0 0 84px; min-width: 84px; border-radius: 6px; padding: 6px 7px; cursor: pointer; border: 1.5px solid; display: flex; flex-direction: column; gap: 2px; transition: opacity .12s; }
.cat-minicard:hover { opacity: 0.85; }
.cat-minicard .cmc-label { font-size: 11px; font-weight: 700; }
.cat-minicard .cmc-type { font-size: 10px; font-weight: 700; }
.cat-minicard .cmc-time { font-size: 9px; opacity: 0.85; }
.cat-minicard .cmc-venue { font-size: 8px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-minicard.is-empty { border-style: dashed; opacity: 0.5; justify-content: center; align-items: center; }
.cat-minicard.is-empty .cmc-label { font-size: 10px; }
.cat-minicard.is-off { opacity: 0.55; }

@media(max-width:480px){
  .day-row-date { width: 52px; }
  .day-row-date .drd-day { font-size: 18px; }
  .cat-minicard { flex: 0 0 72px; min-width: 72px; padding: 5px 6px; }
}

/* ===== TRM Match Management ===== */
.trm-wrap { padding: 12px 16px 24px; }
.trm-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
.trm-filter-group { display: flex; flex-direction: column; gap: 3px; }
.trm-filter-group label { font-size: 10px; color: var(--text-muted); font-weight: 700; }
.trm-filter-group select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; border-radius: var(--radius); font-size: 12px; }
.trm-checkbox-group { display: flex; gap: 12px; align-items: center; margin-left: auto; flex-wrap: wrap; }
.trm-checkbox { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); cursor: pointer; }
.trm-checkbox input { accent-color: var(--accent); }

.trm-status-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.trm-status-confirmed { background: rgba(58,176,122,0.2); color: var(--green); }
.trm-status-negotiating { background: rgba(224,140,58,0.2); color: #e08c3a; }
.trm-status-waiting { background: rgba(74,124,220,0.2); color: var(--accent); }
.trm-status-searching { background: rgba(155,89,220,0.2); color: #9b59dc; }
.trm-status-absent { background: rgba(122,127,154,0.2); color: var(--text-muted); }
.trm-status-cancelled { background: rgba(224,82,82,0.2); color: var(--red); }
.trm-status-needmore { background: rgba(224,188,58,0.2); color: var(--yellow); }

.trm-cat-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 5px; display: inline-block; }

/* Desktop table */
.trm-table-wrap { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
.trm-table { width: 100%; border-collapse: collapse; min-width: 760px; }
.trm-table th { background: var(--surface2); padding: 8px 10px; font-size: 11px; text-align: left; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
.trm-table td { padding: 8px 10px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.trm-table tr:last-child td { border-bottom: none; }
.trm-table tr:hover td { background: rgba(74,124,220,0.05); }
.trm-team-list { display: flex; flex-direction: column; gap: 3px; }
.trm-team-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.trm-btn-edit { background: var(--accent); color: #fff; border: none; padding: 5px 12px; border-radius: var(--radius); font-size: 11px; font-weight: 700; cursor: pointer; }
.trm-btn-edit:hover { opacity: 0.85; }

/* Mobile cards */
.trm-card-list { display: none; flex-direction: column; gap: 10px; }
.trm-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.trm-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.trm-card-date { font-size: 12px; font-weight: 700; color: var(--text-muted); }
.trm-card-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.trm-card-opponent { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.trm-card-teams { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
.trm-card-team-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
.trm-card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.trm-confirm-count { font-size: 12px; font-weight: 700; color: var(--text-muted); }

@media(max-width:760px){
  .trm-table-wrap { display: none; }
  .trm-card-list { display: flex; }
  .trm-checkbox-group { margin-left: 0; }
}

/* TRM Edit Modal */
.trm-edit-section { margin-bottom: 14px; }
.trm-edit-label { font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 5px; display: block; }
.trm-edit-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: var(--radius); font-size: 13px; width: 100%; }
.trm-team-edit-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
.trm-team-edit-row input { flex: 1; }
.trm-team-edit-row select { width: 110px; }
.trm-team-remove-btn { background: rgba(224,82,82,0.15); color: var(--red); border: 1px solid rgba(224,82,82,0.3); border-radius: var(--radius); width: 30px; height: 30px; font-size: 14px; cursor: pointer; flex-shrink: 0; }
.trm-add-team-btn { background: var(--surface2); border: 1px dashed var(--border); color: var(--text-muted); padding: 8px; border-radius: var(--radius); font-size: 12px; cursor: pointer; width: 100%; margin-top: 4px; }
.trm-add-team-btn:hover { border-color: var(--accent); color: var(--accent); }
.trm-modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.trm-save-btn { flex: 1; background: var(--accent); color: #fff; border: none; padding: 11px; border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; }
.trm-cancel-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 11px 18px; border-radius: var(--radius); font-size: 14px; cursor: pointer; }

</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚽ クラブ<span>プランナー</span></div>
  <div class="header-nav">
    <a class="nav-btn primary" href="planner_admin.html">管理画面</a>
  </div>
</div>

<!-- Tabs -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('calendar')">📅 カレンダー</button>
  <button class="tab-btn" onclick="switchTab('list')">📋 一覧</button>
  <button class="tab-btn" onclick="switchTab('load')">📊 負荷管理</button>
  <button class="tab-btn" onclick="switchTab('trm')">🤝 TRM管理</button>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="dash-card">
    <div class="dash-num" id="d-players">–</div>
    <div class="dash-label">登録選手</div>
  </div>
  <div class="dash-card">
    <div class="dash-num" id="d-staff">–</div>
    <div class="dash-label">スタッフ</div>
  </div>
  <div class="dash-card">
    <div class="dash-num" id="d-today">–</div>
    <div class="dash-label">本日の活動</div>
  </div>
</div>

<!-- Calendar Tab -->
<div class="tab-content active" id="tab-calendar">
  <div class="calendar-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <div class="cal-title" id="cal-title">2025年7月</div>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-filter" id="cat-filter">
      <button class="filter-btn active" data-cat="ALL" onclick="toggleFilter(this)">ALL</button>
      <button class="filter-btn active" data-cat="U15" onclick="toggleFilter(this)">U15</button>
      <button class="filter-btn active" data-cat="U14" onclick="toggleFilter(this)">U14</button>
      <button class="filter-btn active" data-cat="U13" onclick="toggleFilter(this)">U13</button>
      <button class="filter-btn active" data-cat="U12" onclick="toggleFilter(this)">U12</button>
      <button class="filter-btn active" data-cat="U11" onclick="toggleFilter(this)">U11</button>
      <button class="filter-btn active" data-cat="U10" onclick="toggleFilter(this)">U10</button>
      <button class="filter-btn active" data-cat="U9" onclick="toggleFilter(this)">U9</button>
      <button class="filter-btn active" data-cat="U8" onclick="toggleFilter(this)">U8</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-wd">日</div><div class="cal-wd">月</div><div class="cal-wd">火</div>
        <div class="cal-wd">水</div><div class="cal-wd">木</div><div class="cal-wd">金</div><div class="cal-wd">土</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
  </div>
</div>

<!-- List Tab -->
<div class="tab-content" id="tab-list">
  <div class="daylist-wrap">
    <div class="daylist-nav">
      <button class="daylist-nav-btn" onclick="changeListRange(-7)">‹ 前へ</button>

<script>
// ===== JSONBin 固定設定（全端末共通） =====
const BIN_ID     = "6a329ff3da38895dfed0580f";
const ACCESS_KEY = "$2a$10$sr0vNOjVIL6jfVcM9YSLLOZoyoq5QhNLCAyIPT7IDiihc6XRA/0U.";

const BIN = {
  async get() {
    try {
      const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { 'X-Access-Key': ACCESS_KEY }
      });
      if (!r.ok) throw new Error('fetch failed');
      const j = await r.json();
      return j.record;
    } catch(e) {
      return null;
    }
  },
  async put(updatedFields) {
    try {
      const current = await this.get();
      const merged = { ...(current||{}), ...updatedFields };
      const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Access-Key': ACCESS_KEY },
        body: JSON.stringify(merged)
      });
      if (!r.ok) throw new Error('put failed');
      return true;
    } catch(e) {
      return false;
    }
  }
};

// ===== State =====
const TODAY = new Date();
let curYear = TODAY.getFullYear();
let curMonth = TODAY.getMonth();
let data = { activities: [], players: [], staff: [], vehicles: [], venues: [], absences: [], personalEvents: [], trmMeta: {} };
let activeFilters = new Set(['U15','U14','U13','U12','U11','U10','U9','U8']);
let listRangeStart = fmtDate(TODAY);
let listRangeAdjusted = false; // 初回だけ「直近の予定がある週」へ自動ジャンプするためのフラグ

const CATS = ['U15','U14','U13','U12','U11','U10','U9','U8'];
const CAT_COLOR = { U15:'#e05252', U14:'#9b59dc', U13:'#4a7cdc', U12:'#3ab07a', U11:'#2ba8a8', U10:'#e0bc3a', U9:'#e08c3a', U8:'#c97ad6' };
const WD = ['日','月','火','水','木','金','土'];
const TYPES = { TR:'TR', TRM:'TRM', GAME:'公式戦', TOUR:'遠征', OFF:'OFF', PRACTICE:'練習試合', OTHER:'その他' };

// "YYYY-MM-DD" 文字列をローカルタイムゾーンで安全にDateへ変換する
// （new Date("YYYY-MM-DD") はUTC0時として解釈されるため、JST環境では前日にズレることがある）
function parseLocalDate(dateStr) {
  if (!dateStr) return new Date(NaN);
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m-1, d);
}

// 複数カテゴリー対応: 既存データ(category:"U13")も新形式(categories:["U13","U12"])も同じ配列として扱う
function getActCats(activity) {
  if (!activity) return [];
  if (Array.isArray(activity.categories) && activity.categories.length) return activity.categories;
  if (activity.category) return [activity.category];
  return [];
}

// ===== Load data =====
async function loadData() {
  const remote = await BIN.get();
  if (remote) {
    data = { activities:[], players:[], staff:[], vehicles:[], venues:[], absences:[], personalEvents:[], trmMeta:{}, ...remote };
  } else {
    // Demo data
    data = getDemoData();
  }
  renderAll();
}

function renderAll() {
  renderDashboard();
  renderCalendar();
  renderList();
  renderLoad();
  renderTrmList();
}

// ===== Dashboard =====
function renderDashboard() {
  const todayStr = fmtDate(TODAY);
  const todayActs = data.activities.filter(a => a.date === todayStr);
  document.getElementById('d-players').textContent = (data.players||[]).length;
  document.getElementById('d-staff').textContent = (data.staff||[]).length;
  document.getElementById('d-today').textContent = todayActs.length;
}

// ===== Calendar =====
function changeMonth(d) {
  curMonth += d;
  if (curMonth < 0) { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0; curYear++; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = `${curYear}年${curMonth+1}月`;
  const first = new Date(curYear, curMonth, 1);
  const last = new Date(curYear, curMonth+1, 0);
  const startWd = first.getDay();
  const cells = [];
  for (let i=0;i<startWd;i++) {
    const d = new Date(curYear, curMonth, -startWd+1+i);
    cells.push({ date: d, other: true });
  }
  for (let d=1;d<=last.getDate();d++) cells.push({ date: new Date(curYear,curMonth,d), other:false });
  while (cells.length % 7 !== 0) {
    const d = new Date(curYear, curMonth+1, cells.length - (startWd + last.getDate()) + 1);
    cells.push({ date: d, other: true });
  }

  const acts = data.activities || [];
  const absences = data.absences || [];
  const pevents = data.personalEvents || [];
  const container = document.getElementById('cal-days');
  container.innerHTML = cells.map(c => {
    const ds = fmtDate(c.date);
    const dayActs = acts.filter(a => a.date === ds && getActCats(a).some(cat=>activeFilters.has(cat)));
    const dayAbsCount = absences.filter(ab => ds >= ab.startDate && ds <= ab.endDate).length;
    const dayPevents = pevents.filter(pe => pe.date === ds);
    const isToday = ds === fmtDate(TODAY);
    const absBadge = dayAbsCount ? `<span class="abs-badge-view">🏖${dayAbsCount}</span>` : '';
    const totalItems = dayActs.length + dayPevents.length;
    const maxChips = 2;
    const chips = dayActs.slice(0,maxChips).map(a => {
      const cats = getActCats(a);
      const catLabel = cats.join('/');
      const primaryCat = cats[0]||'';
      return `
      <div class="event-chip" data-cat="${primaryCat}" onclick="openEvent('${a.id}')" title="${catLabel} ${a.name||''} ${a.startTime}〜${a.endTime}">
        ${catLabel} ${a.actType||''}
      </div>
    `;
    }).join('');
    const remainingSlots = Math.max(0, maxChips - dayActs.length);
    const peChips = dayPevents.slice(0,remainingSlots).map(pe => `
      <div class="event-chip personal-event-view" onclick="openPersonalEvent('${pe.id}')" title="${pe.type} ${pe.title||''}">
        📌${pe.type}
      </div>
    `).join('');
    const shownCount = Math.min(dayActs.length,maxChips) + Math.min(dayPevents.length,remainingSlots);
    const more = totalItems > shownCount ? `<div class="more-chip" onclick="openDayDetail('${ds}')">+${totalItems-shownCount}件</div>` : '';
    return `<div class="cal-day${c.other?' other-month':''}${isToday?' today':''}">
      <div class="day-num">${c.date.getDate()}${absBadge}</div>
      ${chips}${peChips}${more}
    </div>`;
  }).join('');
}

function toggleFilter(btn) {
  const cat = btn.dataset.cat;
  if (cat === 'ALL') {
    const allActive = CATS.every(c => activeFilters.has(c));
    if (allActive) {
      activeFilters.clear();
      document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));
    } else {
      CATS.forEach(c => activeFilters.add(c));
      document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.add('active'));
    }
  } else {
    if (activeFilters.has(cat)) { activeFilters.delete(cat); btn.classList.remove('active'); }
    else { activeFilters.add(cat); btn.classList.add('active'); }
    const allActive = CATS.every(c => activeFilters.has(c));
    document.querySelector('.filter-btn[data-cat="ALL"]').classList.toggle('active', allActive);
  }
  renderCalendar();
}

// ===== List (Day-row x Category grid) =====
function changeListRange(days) {
  const d = parseLocalDate(listRangeStart);
  d.setDate(d.getDate() + days);
  listRangeStart = fmtDate(d);
  renderList();
}

function renderListLegend() {
  const el = document.getElementById('daylist-legend');
  if (!el) return;
  el.innerHTML = CATS.map(cat => `
    <span class="daylist-legend-item">
      <span class="daylist-legend-dot" style="background:${CAT_COLOR[cat]}"></span>${cat}
    </span>
  `).join('');
}

function renderList() {
  // 一覧タブを開いた直後（today起点のまま動いていない場合）は、
  // 直近で実際に予定がある週まで自動的にジャンプする
  if (!listRangeAdjusted) {
    listRangeAdjusted = true;
    const todayStr = fmtDate(TODAY);
    const upcoming = (data.activities||[])
      .map(a=>a.date)
      .filter(d => d >= todayStr)
      .sort();
    if (upcoming.length && upcoming[0] !== listRangeStart) {
      // 直近の予定がある日付が含まれる週の開始日（同じ起点ルールでよい：その日からの7日間表示に揃える）
      listRangeStart = upcoming[0];
    }
  }

  renderListLegend();
  const acts = data.activities || [];
  const numDays = 7;
  const start = parseLocalDate(listRangeStart);
  const end = new Date(start); end.setDate(end.getDate() + numDays - 1);
  document.getElementById('daylist-range-label').textContent =
    `${start.getMonth()+1}/${start.getDate()} 〜 ${end.getMonth()+1}/${end.getDate()}`;

  const el = document.getElementById('act-list');
  const rows = [];
  for (let i=0;i<numDays;i++) {
    const d = new Date(start); d.setDate(d.getDate()+i);
    const ds = fmtDate(d);
    const isToday = ds === fmtDate(TODAY);
    const wd = d.getDay();
    const dateClass = wd===0 ? 'is-sun' : (wd===6 ? 'is-sat' : '');

    const dayActs = acts.filter(a => a.date === ds);

    const catCards = CATS.map(cat => {
      // この日・このカテゴリーに該当する活動を探す（複数カテゴリーの予定も拾う）
      const match = dayActs.find(a => getActCats(a).includes(cat));
      const color = CAT_COLOR[cat] || '#888';
      if (!match) {
        return `<div class="cat-minicard is-empty" style="border-color:${color}55;color:${color}" onclick="handleEmptyCatTap('${ds}','${cat}')">
          <div class="cmc-label">${cat}</div>
          <div class="cmc-type">予定なし</div>
        </div>`;
      }
      const matchCats = getActCats(match);
      const isJoint = matchCats.length > 1;
      const isOff = match.actType === 'OFF';
      return `<div class="cat-minicard${isOff?' is-off':''}" style="border-color:${color};background:${color}1a;color:${color}" onclick="openEvent('${match.id}')" title="${isJoint?'合同：'+matchCats.join('/'):cat}">
        <div class="cmc-label">${cat}${isJoint?' 🔗':''}</div>
        <div class="cmc-type">${isOff?'OFF':(match.actType||'')}</div>
        ${!isOff?`<div class="cmc-time">${match.startTime||''}</div>`:''}
        ${!isOff && match.venue?`<div class="cmc-venue">📍${match.venue}</div>`:''}
      </div>`;
    }).join('');

    rows.push(`
      <div class="day-row-card${isToday?' is-today':''}">
        <div class="day-row-date ${dateClass}">
          <div class="drd-day">${d.getDate()}</div>
          <div class="drd-wd">${WD[wd]}</div>
          ${isToday?'<div class="drd-today-tag">今日</div>':''}
        </div>
        <div class="day-row-cats">${catCards}</div>
      </div>
    `);
  }
  el.innerHTML = rows.join('') || '<div style="padding:24px;text-align:center;color:var(--text-muted)">表示する日付がありません</div>';
}

function handleEmptyCatTap(ds, cat) {
  alert(`${ds} の ${cat} には予定がありません。\n新規登録は管理画面から行ってください。`);
}

// ===== Load Management =====
function renderLoad() {
  const players = data.players || [];
  const acts = data.activities || [];
  const absences = data.absences || [];
  const tbody = document.getElementById('load-tbody');

  const rows = players.map(p => {
    const myActs = acts.filter(a => {
      const d = parseLocalDate(a.date);
      if (d.getFullYear() !== curYear || d.getMonth() !== curMonth) return false;
      if (a.actType === 'OFF') return false;
      if ((a.players||[]).includes(p.name) || getActCats(a).includes(p.category)) return true;
      return false;
    });
    const absActs = absences.filter(ab => ab.playerName === p.name);
    const activeDays = myActs.filter(a => {
      return !absActs.some(ab => a.date >= ab.startDate && a.date <= ab.endDate);
    });

    // Consecutive days
    const dates = [...new Set(activeDays.map(a=>a.date))].sort();
    let maxConsec = 0, consec = 1;
    for (let i=1;i<dates.length;i++) {
      const prev = parseLocalDate(dates[i-1]);
      const cur = parseLocalDate(dates[i]);
      const diff = (cur - prev) / 86400000;
      if (diff === 1) { consec++; maxConsec = Math.max(maxConsec, consec); }
      else consec = 1;
    }
    maxConsec = Math.max(maxConsec, consec > 1 ? consec : (dates.length>0?1:0));

    const total = dates.length;
    let level = 'green';
    if (total >= 20 || maxConsec >= 7) level = 'red';
    else if (total >= 15 || maxConsec >= 5) level = 'yellow';
    const pct = Math.min(100, total / 25 * 100);
    const badge = { green:'badge-green', yellow:'badge-yellow', red:'badge-red' }[level];
    const label = { green:'正常', yellow:'注意', red:'要注意' }[level];

    return `<tr>
      <td>${p.name}</td>
      <td><span style="color:${CAT_COLOR[p.category]||'#888'}">${p.category}</span></td>
      <td>${total}日</td>
      <td>${maxConsec}日</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="load-bar-wrap"><div class="load-bar load-${level}" style="width:${pct}%"></div></div>
          <span class="badge ${badge}">${label}</span>
        </div>
      </td>
    </tr>`;
  });

  tbody.innerHTML = rows.join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:16px">選手データなし</td></tr>';
}

// ===== Modal =====
function openDayDetail(ds) {
  const dayActs = (data.activities||[]).filter(a => a.date === ds && getActCats(a).some(cat=>activeFilters.has(cat)));
  const dayPevents = (data.personalEvents||[]).filter(pe => pe.date === ds);
  const d = parseLocalDate(ds);

  const actRows = dayActs.map(a => {
    const cats = getActCats(a);
    const catLabel = cats.join('/');
    const color = CAT_COLOR[cats[0]] || '#888';
    return `<div class="ev-row" style="cursor:pointer" onclick="openEvent('${a.id}')">
      <span class="ev-row-label" style="color:${color};font-weight:700">${catLabel}</span>
      <span class="ev-row-val">${a.actType||''} ${a.name?'｜'+a.name:''} ${a.startTime?`(${a.startTime}〜${a.endTime})`:''}</span>
    </div>`;
  }).join('');

  const peRows = dayPevents.map(pe => `
    <div class="ev-row" style="cursor:pointer" onclick="openPersonalEvent('${pe.id}')">
      <span class="ev-row-label" style="color:var(--text-muted)">📌${pe.type}</span>
      <span class="ev-row-val">${pe.title||''}</span>
    </div>`).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="event-detail">
      <div class="ev-name">${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}）の予定</div>
      <div class="ev-rows">
        ${actRows}${peRows}
        ${(!actRows && !peRows) ? '<div style="color:var(--text-muted);font-size:13px">予定はありません</div>' : ''}
      </div>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function openEvent(id) {
  const a = (data.activities||[]).find(x => x.id === id);
  if (!a) return;
  const cats = getActCats(a);
  const primaryCat = cats[0]||'';
  const color = CAT_COLOR[primaryCat] || '#888';
  document.getElementById('modal-body').innerHTML = `
    <div class="event-detail">
      <span class="ev-cat" style="background:${color}22;color:${color}">${cats.join('/')}</span>
      <div class="ev-name">${a.name||a.actType}</div>
      <div class="ev-rows">
        <div class="ev-row"><span class="ev-row-label">日付</span><span class="ev-row-val">${a.date} (${WD[parseLocalDate(a.date).getDay()]})</span></div>
        <div class="ev-row"><span class="ev-row-label">時間</span><span class="ev-row-val">${a.startTime} 〜 ${a.endTime}</span></div>
        ${a.actType?`<div class="ev-row"><span class="ev-row-label">種別</span><span class="ev-row-val">${a.actType}</span></div>`:''}
        ${a.venue?`<div class="ev-row"><span class="ev-row-label">会場</span><span class="ev-row-val">📍 ${a.venue}</span></div>`:''}
        ${a.staff&&a.staff.length?`<div class="ev-row"><span class="ev-row-label">スタッフ</span><span class="ev-row-val">👤 ${a.staff.join('、')}</span></div>`:''}
        ${a.vehicles&&a.vehicles.length?`<div class="ev-row"><span class="ev-row-label">車両</span><span class="ev-row-val">🚐 ${a.vehicles.join('、')}</span></div>`:''}
        ${a.playerCount!=null?`<div class="ev-row"><span class="ev-row-label">参加人数</span><span class="ev-row-val">${a.playerCount}名</span></div>`:''}
        ${a.notes?`<div class="ev-row"><span class="ev-row-label">備考</span><span class="ev-row-val">${a.notes}</span></div>`:''}
      </div>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
}

function openPersonalEvent(id) {
  const pe = (data.personalEvents||[]).find(x => x.id === id);
  if (!pe) return;
  document.getElementById('modal-body').innerHTML = `
    <div class="event-detail">
      <span class="ev-cat" style="background:#7a7f9a22;color:#7a7f9a">📌 ${pe.type}</span>
      <div class="ev-name">${pe.title||pe.type}</div>
      <div class="ev-rows">
        <div class="ev-row"><span class="ev-row-label">日付</span><span class="ev-row-val">${pe.date} (${WD[parseLocalDate(pe.date).getDay()]})</span></div>
        <div class="ev-row"><span class="ev-row-label">対象</span><span class="ev-row-val">${pe.targetType==='staff'?'スタッフ':'選手'}: ${(pe.targets||[]).join('、')}</span></div>
        ${pe.notes?`<div class="ev-row"><span class="ev-row-label">備考</span><span class="ev-row-val">${pe.notes}</span></div>`:''}
      </div>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

// ===== Tab =====
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ===== Helpers =====
function fmtDate(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ============================================================
// TRM Match Management
// 既存の data.activities には一切書き込まない。
// 編集データ（主対戦相手・必要チーム数・追加参加チーム・メモ）はすべて
// data.trmMeta[activityId] という別オブジェクトに保存する。
// ============================================================
const TRM_STATUS_LABEL = { confirmed:'確定', negotiating:'打診中', waiting:'返信待ち', searching:'探し中', absent:'不参加', cancelled:'キャンセル' };
const TRM_STATUS_CLASS = { confirmed:'trm-status-confirmed', negotiating:'trm-status-negotiating', waiting:'trm-status-waiting', searching:'trm-status-searching', absent:'trm-status-absent', cancelled:'trm-status-cancelled' };

// TRM/TM/トレーニングマッチに該当する予定かどうか判定
function isTrmActivity(a) {
  if (a.actType === 'OFF') return false;
  const hay = `${a.actType||''} ${a.name||''}`;
  return /TRM|TM|トレーニングマッチ/i.test(hay);
}

// 予定名から主対戦相手を自動抽出（vs / VS / Vs / 対 / v / ＶＳ に対応）
function extractOpponent(name) {
  if (!name) return '';
  const patterns = [
    /(?:vs|VS|Vs|ＶＳ)\s*(.+)$/,
    /\s対\s*(.+)$/,
    /\sv\s+(.+)$/i
  ];
  for (const re of patterns) {
    const m = name.match(re);
    if (m && m[1]) return m[1].trim();
  }
  return '';
}

function getTrmMeta(activityId) {
  const meta = (data.trmMeta && data.trmMeta[activityId]) || {};
  return {
    opponent: meta.opponent != null ? meta.opponent : null, // null = 未編集（自動抽出に従う）
    requiredTeams: meta.requiredTeams != null ? meta.requiredTeams : 1,
    teams: Array.isArray(meta.teams) ? meta.teams : [],
    notes: meta.notes || ''
  };
}

function getEffectiveOpponent(activity, meta) {
  if (meta.opponent != null && meta.opponent !== '') return meta.opponent;
  if (meta.opponent === '') return ''; // 明示的に空にされた場合
  return extractOpponent(activity.name) || '未定';
}

// 主対戦相手＋追加参加チームを統合して状態集計
function computeTrmSummary(activity, meta) {
  const teams = [];
  const opponent = getEffectiveOpponent(activity, meta);
  // 主対戦相手は常に1チーム目（状態は確定扱い。ただし追加チームと同様に管理したい場合はteamsに含める設計も可）
  teams.push({ name: opponent, status: 'confirmed', isOpponent: true });
  meta.teams.forEach(t => teams.push({ ...t, isOpponent: false }));

  const required = meta.requiredTeams || 1;
  const confirmedCount = teams.filter(t => t.status === 'confirmed').length;
  const hasCancelled = teams.some(t => t.status === 'cancelled');

  let overall, overallClass;
  if (hasCancelled && confirmedCount === 0) {
    overall = 'キャンセル'; overallClass = 'trm-status-cancelled';
  } else if (confirmedCount >= required) {
    overall = '確定'; overallClass = 'trm-status-confirmed';
  } else {
    const remain = required - confirmedCount;
    overall = `あと${remain}チーム探す`; overallClass = 'trm-status-needmore';
  }

  return { teams, required, confirmedCount, overall, overallClass, isFullyConfirmed: confirmedCount >= required && !hasCancelled };
}

function getTrmActivities() {
  return (data.activities||[]).filter(isTrmActivity);
}

function passesTrmFilters(activity, summary) {
  const period = document.getElementById('trm-f-period')?.value || '3m';
  const catFilter = document.getElementById('trm-f-cat')?.value || '';
  const statusFilter = document.getElementById('trm-f-status')?.value || '';
  const unconfirmedOnly = document.getElementById('trm-f-unconfirmed')?.checked;
  const excludeCancel = document.getElementById('trm-f-excludecancel')?.checked;

  const todayStr = fmtDate(TODAY);
  if (period === '1m') {
    const limit = new Date(TODAY); limit.setMonth(limit.getMonth()+1);
    if (activity.date < todayStr || activity.date > fmtDate(limit)) return false;
  } else if (period === '3m') {
    const limit = new Date(TODAY); limit.setMonth(limit.getMonth()+3);
    if (activity.date < todayStr || activity.date > fmtDate(limit)) return false;
  } else if (period === 'past') {
    if (activity.date >= todayStr) return false;
  }
  if (catFilter && !getActCats(activity).includes(catFilter)) return false;
  if (statusFilter === 'confirmed' && summary.overall !== '確定') return false;
  if (statusFilter === 'needmore' && !summary.overall.startsWith('あと')) return false;
  if (unconfirmedOnly && summary.isFullyConfirmed) return false;
  if (excludeCancel && summary.overall === 'キャンセル') return false;
  return true;
}

function renderTrmList() {
  const tableBody = document.getElementById('trm-table-body');
  const cardList = document.getElementById('trm-card-list');
  const emptyMsg = document.getElementById('trm-empty-msg');
  if (!tableBody) return; // タブ未初期化時の安全策

  const trmActs = getTrmActivities()
    .map(a => ({ activity:a, meta:getTrmMeta(a.id) }))
    .map(x => ({ ...x, summary: computeTrmSummary(x.activity, x.meta) }))
    .filter(x => passesTrmFilters(x.activity, x.summary))
    .sort((a,b) => a.activity.date.localeCompare(b.activity.date));

  if (!trmActs.length) {
    tableBody.innerHTML = '';
    cardList.innerHTML = '';
    emptyMsg.style.display = 'block';
    return;
  }
  emptyMsg.style.display = 'none';

  // ----- Desktop table -----
  tableBody.innerHTML = trmActs.map(({activity:a, meta, summary}) => {
    const cats = getActCats(a);
    const catLabel = cats.join('.');
    const color = CAT_COLOR[cats[0]] || '#888';
    const d = parseLocalDate(a.date);
    const teamRows = summary.teams.map(t => `
      <div class="trm-team-row">
        <span>${t.isOpponent?'主対戦相手：':'○'} ${t.name||'未定'}</span>
        <span class="trm-status-badge ${TRM_STATUS_CLASS[t.status]||''}">${TRM_STATUS_LABEL[t.status]||t.status}</span>
      </div>`).join('');
    return `<tr>
      <td>${a.date.slice(5).replace('-','/')}<br><span style="color:var(--text-muted);font-size:10px">(${WD[d.getDay()]})</span></td>
      <td><span class="trm-cat-badge" style="background:${color}22;color:${color}">${catLabel}</span></td>
      <td>${a.startTime}〜${a.endTime}<br><span style="color:var(--text-muted);font-size:10px">${a.venue||''}</span></td>
      <td>${a.name||a.actType}</td>
      <td><div class="trm-team-list">${teamRows}<div style="font-size:10px;color:var(--text-muted);margin-top:2px">必要チーム数：${summary.required}</div></div></td>
      <td><span class="trm-status-badge ${summary.overallClass}">${summary.overall}</span><br><span style="font-size:10px;color:var(--text-muted)">確定：${summary.confirmedCount}/${summary.required}</span></td>
      <td><button class="trm-btn-edit" onclick="openTrmEditModal('${a.id}')">詳細・編集</button></td>
    </tr>`;
  }).join('');

  // ----- Mobile cards -----
  cardList.innerHTML = trmActs.map(({activity:a, meta, summary}) => {
    const cats = getActCats(a);
    const catLabel = cats.join('.');
    const color = CAT_COLOR[cats[0]] || '#888';
    const d = parseLocalDate(a.date);
    const opponent = getEffectiveOpponent(a, meta);
    const teamRows = summary.teams.filter(t=>!t.isOpponent).map(t => `
      <div class="trm-card-team-row">
        <span>・${t.name||'未定'}</span>
        <span class="trm-status-badge ${TRM_STATUS_CLASS[t.status]||''}">${TRM_STATUS_LABEL[t.status]||t.status}</span>
      </div>`).join('');
    return `<div class="trm-card" onclick="openTrmEditModal('${a.id}')">
      <div class="trm-card-head">
        <span class="trm-card-date">${a.date.slice(5).replace('-','/')}（${WD[d.getDay()]}）</span>
        <span class="trm-cat-badge" style="background:${color}22;color:${color}">${catLabel}</span>
      </div>
      <div class="trm-card-name">${a.name||a.actType}</div>
      <div class="trm-card-opponent">主対戦相手：${opponent}</div>
      ${teamRows?`<div class="trm-card-teams">${teamRows}</div>`:''}
      <div class="trm-card-footer">
        <span class="trm-status-badge ${summary.overallClass}">${summary.overall}</span>
        <span class="trm-confirm-count">確定：${summary.confirmedCount}/${summary.required}</span>
      </div>
    </div>`;
  }).join('');
}

// ----- Edit Modal -----
let trmEditingId = null;
let trmEditingTeams = [];

function openTrmEditModal(activityId) {
  const activity = (data.activities||[]).find(x=>x.id===activityId);
  if (!activity) return;
  trmEditingId = activityId;
  const meta = getTrmMeta(activityId);
  trmEditingTeams = JSON.parse(JSON.stringify(meta.teams));

  const cats = getActCats(activity);
  const opponent = meta.opponent != null ? meta.opponent : extractOpponent(activity.name);

  document.getElementById('trm-edit-body').innerHTML = `
    <div class="trm-edit-section">
      <span class="trm-cat-badge" style="background:${CAT_COLOR[cats[0]]||'#888'}22;color:${CAT_COLOR[cats[0]]||'#888'}">${cats.join('.')}</span>
      <div style="font-size:16px;font-weight:700;margin-top:8px">${activity.name||activity.actType}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${activity.date} ${activity.startTime}〜${activity.endTime} ／ ${activity.venue||'会場未設定'}</div>
    </div>
    <div class="trm-edit-section">
      <label class="trm-edit-label">主対戦相手</label>
      <input type="text" class="trm-edit-input" id="trm-edit-opponent" value="${opponent}" placeholder="対戦相手名">
    </div>
    <div class="trm-edit-section">
      <label class="trm-edit-label">必要チーム数</label>
      <input type="number" class="trm-edit-input" id="trm-edit-required" min="1" value="${meta.requiredTeams}" style="width:100px">
    </div>
    <div class="trm-edit-section">
      <label class="trm-edit-label">追加参加チーム</label>
      <div id="trm-edit-teams"></div>
      <button class="trm-add-team-btn" onclick="addTrmTeamRow()">＋ チームを追加</button>
    </div>
    <div class="trm-edit-section">
      <label class="trm-edit-label">メモ</label>
      <textarea class="trm-edit-input" id="trm-edit-notes" rows="3" placeholder="連絡事項など">${meta.notes}</textarea>
    </div>
    <div class="trm-modal-actions">
      <button class="trm-save-btn" onclick="saveTrmEdit()">💾 保存</button>
      <button class="trm-cancel-btn" onclick="closeTrmEditModal()">キャンセル</button>
    </div>
  `;
  renderTrmTeamRows();
  document.getElementById('trm-edit-modal').classList.add('open');
}

function renderTrmTeamRows() {
  const el = document.getElementById('trm-edit-teams');
  if (!el) return;
  el.innerHTML = trmEditingTeams.map((t, i) => `
    <div class="trm-team-edit-row">
      <input type="text" class="trm-edit-input" value="${t.name||''}" placeholder="チーム名" onchange="trmEditingTeams[${i}].name=this.value">
      <select class="trm-edit-input" onchange="trmEditingTeams[${i}].status=this.value">
        ${Object.entries(TRM_STATUS_LABEL).map(([v,l])=>`<option value="${v}"${t.status===v?' selected':''}>${l}</option>`).join('')}
      </select>
      <button class="trm-team-remove-btn" onclick="removeTrmTeamRow(${i})">✕</button>
    </div>
  `).join('') || '<div style="font-size:12px;color:var(--text-muted);padding:4px 0">追加参加チームはまだありません</div>';
}

function addTrmTeamRow() {
  trmEditingTeams.push({ name:'', status:'searching', memo:'' });
  renderTrmTeamRows();
}
function removeTrmTeamRow(i) {
  trmEditingTeams.splice(i,1);
  renderTrmTeamRows();
}

async function saveTrmEdit() {
  if (!trmEditingId) return;
  const opponentVal = document.getElementById('trm-edit-opponent').value.trim();
  const requiredVal = parseInt(document.getElementById('trm-edit-required').value) || 1;
  const notesVal = document.getElementById('trm-edit-notes').value;

  if (!data.trmMeta) data.trmMeta = {};
  data.trmMeta[trmEditingId] = {
    opponent: opponentVal,
    requiredTeams: requiredVal,
    teams: trmEditingTeams.filter(t => t.name && t.name.trim() !== ''),
    notes: notesVal
  };

  closeTrmEditModal();
  renderTrmList();

  // 既存の activities, players, staff 等には一切触れず、trmMeta だけをJSONBinに反映
  const ok = await BIN.put({ trmMeta: data.trmMeta });
  if (!ok) {
    alert('JSONBinへの保存に失敗しました。通信環境をご確認の上、もう一度お試しください。');
  }
}

function closeTrmEditModal() {
  document.getElementById('trm-edit-modal').classList.remove('open');
  trmEditingId = null;
  trmEditingTeams = [];
}
